# Edge config: rate-limit the API and add security headers (BRD §6, SR-101-adjacent).
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Security headers for everything we serve at the edge.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # SPA: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + admin + schema to the Django backend service (rate-limited).
    location ~ ^/(api|admin|static)/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
