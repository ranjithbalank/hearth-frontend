# Edge config: rate-limit the API and add security headers (BRD §6, SR-101-adjacent).
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

# Don't disclose the nginx version in the Server response header
# (security review 2026-07, finding I6).
server_tokens off;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Security headers for everything we serve at the edge. CSP/HSTS were
    # previously only set by the Django app, which doesn't cover the SPA's
    # own static assets served directly here (finding I6) — mirrors the
    # app-level policy in apps/accounts/security.py for consistency.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'" always;
    # Harmless over plain HTTP (browsers only act on HSTS for already-secure
    # connections) — ready for when a TLS-terminating proxy sits in front.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # SPA: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + admin + schema to the Django backend service (rate-limited).
    location ~ ^/(api|admin|static)/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
